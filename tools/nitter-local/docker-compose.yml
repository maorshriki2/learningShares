services:
  redis:
    image: redis:7-alpine
    container_name: nitter-redis
    restart: unless-stopped

  nitter:
    image: zedeus/nitter:latest
    container_name: nitter
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - redis
    volumes:
      - ./nitter.conf:/src/nitter.conf:ro
      - ./sessions.jsonl:/src/sessions.jsonl:ro

